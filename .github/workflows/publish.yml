name: Publish Package

on:
  release:
    types: [published] # Publishes when you publish a GitHub Release

permissions:
  id-token: write # Required for npm trusted publishing / OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v5

      # 2. Setup Node
      # Do not set NODE_AUTH_TOKEN when using npm trusted publishing
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # 3. Enable Corepack and install dependencies
      - name: Enable Corepack and install dependencies
        run: |
          corepack enable
          npm ci

      # 4. Confirm versions for debugging
      - name: Confirm Node and npm versions
        run: |
          node --version
          npm --version

      # 5. Build UMD
      - name: Build UMD
        run: npm run build

      # 6. Build ESM
      - name: Build ESM
        run: npm run build:esm

      # 7. Verify build artifacts exist
      - name: Verify dist
        run: npm run verify:dist

      # 8. Publish to npm using GitHub trusted publishing
      - name: Publish to npm
        run: npm publish --provenance
